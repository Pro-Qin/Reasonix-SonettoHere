name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build + Upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          for p in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            os="${p%/*}"
            arch="${p#*/}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            echo "Building $os/$arch..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
              -trimpath \
              -o "dist/reasonix-${os}-${arch}${ext}" \
              ./cmd/reasonix
          done
          ls -lh dist/

      - name: Package archives
        run: |
          cd dist
          for f in reasonix-darwin-* reasonix-linux-*; do
            tar czf "${f}.tar.gz" "$f"
          done
          for f in reasonix-windows-*; do
            zip "${f%.exe}.zip" "$f"
          done
          ls -lh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum reasonix-*.tar.gz reasonix-*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Reasonix-SonettoHere ${{ github.ref_name }}" \
            --notes "See [README](https://github.com/${{ github.repository }}) for details." \
            || echo "Release already exists, will upload assets"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          for asset in reasonix-*.tar.gz reasonix-*.zip SHA256SUMS; do
            echo "Uploading $asset..."
            gh release upload "${{ github.ref_name }}" "$asset" --repo "${{ github.repository }}" --clobber
          done
