name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (amd64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: cd desktop && wails build -clean
      - run: gh release upload "${{ github.ref_name }}" desktop/build/bin/reasonix-desktop.exe --repo "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  build-macos:
    name: macOS (universal)
    runs-on: macos-14
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: brew install create-dmg
      - run: cd desktop && wails build -clean
      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          create-dmg --overwrite --dmg-title="Reasonix-SonettoHere-${VERSION}" desktop/build/bin/Reasonix.app dist/Reasonix-SonettoHere-${VERSION}.dmg || true
          ls -la dist/ 2>/dev/null || true
      - run: |
          if [ -f dist/*.dmg ]; then
            gh release upload "${{ github.ref_name }}" dist/*.dmg --repo "${{ github.repository }}" --clobber
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-linux:
    name: Linux (amd64)
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: cd desktop && wails build -tags webkit2_41 -clean
      - run: gh release upload "${{ github.ref_name }}" desktop/build/bin/reasonix-desktop --repo "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
